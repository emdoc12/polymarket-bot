services:
  polybot:
    image: ghcr.io/emdoc12/polymarket-bot:latest
    container_name: polybot
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - /mnt/user/appdata/polybot:/data
    environment:
      - NODE_ENV=production
      - DATA_DIR=/data
      # --- Live trading credentials (optional, leave blank for paper mode) ---
      # - POLY_PRIVATE_KEY=your_polygon_wallet_private_key
      # - POLY_API_KEY=your_clob_api_key
      # - POLY_API_SECRET=your_clob_api_secret
      # - POLY_PASSPHRASE=your_clob_passphrase
